services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alpha_studio}
      POSTGRES_USER: ${POSTGRES_USER:-alpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alpha_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-alpha} -d $${POSTGRES_DB:-alpha_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://alpha:alpha_password@postgres:5432/alpha_studio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BIND_ADDR: 0.0.0.0:8080
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,api,admin-web,postgres,redis}
      no_proxy: ${no_proxy:-localhost,127.0.0.1,api,admin-web,postgres,redis}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "alpha-studio-backend", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: admin-web/Dockerfile
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    env_file:
      - path: .env
        required: false
    environment:
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,api,admin-web,postgres,redis}
      no_proxy: ${no_proxy:-localhost,127.0.0.1,api,admin-web,postgres,redis}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - admin-web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
