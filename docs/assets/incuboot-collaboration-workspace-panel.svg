<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1100" viewBox="0 0 1100 1100" role="img" aria-labelledby="title desc">
  <title id="title">Incuboot 合作推广营销对话工作台</title>
  <desc id="desc">参考 Codex 的对话界面，展示品牌团队通过聊天式 Agent 处理合作邮件、评估 KOL、生成回复草稿和记录审计日志。</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".5" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d25"/>
      <stop offset=".6" stop-color="#10172f"/>
      <stop offset="1" stop-color="#17113f"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset=".52" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#c026d3"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-16%" y="-16%" width="132%" height="138%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#0b1220" flood-opacity=".22"/>
    </filter>
    <filter id="cardShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#0b1220" flood-opacity=".10"/>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#cbd5e1" stroke-opacity=".24"/>
    </pattern>
    <style>
      .font{font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif}
      .display{font-family:"Sora","Noto Sans SC","PingFang SC",Arial,sans-serif}
      .ink{fill:#0b1220}
      .muted{fill:#64748b}
      .soft{fill:#94a3b8}
      .white{fill:#fff}
      .label{font-size:20px;font-weight:800}
      .small{font-size:14px}
      .tiny{font-size:12px}
      .round{stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="1100" height="1100" rx="44" fill="url(#pageBg)"/>
  <rect width="1100" height="1100" fill="url(#grid)" opacity=".46"/>
  <path d="M87 913 C230 826 354 938 498 836 C644 733 748 792 913 692 C989 646 1022 660 1062 624" fill="none" stroke="#7c3aed" stroke-opacity=".12" stroke-width="52" stroke-linecap="round"/>
  <path d="M91 222 C239 156 383 199 526 128 C682 51 841 101 1015 69" fill="none" stroke="#06b6d4" stroke-opacity=".10" stroke-width="40" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="64" y="72" width="972" height="958" rx="36" fill="url(#shell)"/>
    <rect x="64" y="72" width="972" height="958" rx="36" fill="none" stroke="#1e293b" stroke-width="1.2"/>
  </g>

  <rect x="90" y="98" width="920" height="66" rx="24" fill="#0b1028"/>
  <circle cx="122" cy="131" r="8" fill="#fb7185"/>
  <circle cx="148" cy="131" r="8" fill="#f59e0b"/>
  <circle cx="174" cy="131" r="8" fill="#10b981"/>
  <rect x="212" y="115" width="42" height="32" rx="10" fill="url(#brand)"/>
  <path d="M233 121l4.1 9.4 9.9 1.1-7.1 6.8 1.7 10-8.6-4.8-8.6 4.8 1.7-10-7.1-6.8 9.9-1.1z" fill="#fff"/>
  <text x="268" y="139" class="display white" font-size="24" font-weight="800">Collab Agent</text>
  <text x="452" y="139" class="font" font-size="14" fill="#94a3b8">合作推广营销 · 对话式工作台</text>
  <rect x="768" y="115" width="88" height="32" rx="13" fill="#151d3a"/>
  <circle cx="788" cy="131" r="6" fill="#10b981"/>
  <text x="804" y="136" class="font white" font-size="12" font-weight="700">AI 在线</text>
  <rect x="868" y="115" width="116" height="32" rx="13" fill="#23204a"/>
  <text x="894" y="136" class="font white" font-size="12" font-weight="700">人工确认</text>

  <rect x="90" y="184" width="222" height="818" rx="28" fill="#0d142b"/>
  <text x="120" y="229" class="display white" font-size="18" font-weight="800">会话</text>
  <text x="120" y="253" class="font" font-size="13" fill="#64748b">Brand threads</text>
  <g class="font" font-size="13" font-weight="700">
    <rect x="112" y="283" width="178" height="58" rx="17" fill="#1f1b4b"/>
    <circle cx="133" cy="312" r="7" fill="#8b5cf6"/>
    <text x="153" y="305" fill="#fff">Luna Skin</text>
    <text x="153" y="325" fill="#94a3b8" font-size="11">合作邮件评估</text>
    <rect x="112" y="355" width="178" height="54" rx="16" fill="#121a35"/>
    <circle cx="133" cy="382" r="7" fill="#06b6d4"/>
    <text x="153" y="378" fill="#cbd5e1">Nomad Gear</text>
    <text x="153" y="397" fill="#64748b" font-size="11">达人 brief</text>
    <rect x="112" y="423" width="178" height="54" rx="16" fill="#121a35"/>
    <circle cx="133" cy="450" r="7" fill="#f59e0b"/>
    <text x="153" y="446" fill="#cbd5e1">Glow Home</text>
    <text x="153" y="465" fill="#64748b" font-size="11">样品发货</text>
  </g>

  <text x="120" y="533" class="display" font-size="12" fill="#64748b" font-weight="800" letter-spacing="1.1">AGENTS</text>
  <g class="font" font-size="13" font-weight="700" fill="#cbd5e1">
    <rect x="112" y="562" width="178" height="38" rx="12" fill="#111b37"/>
    <text x="136" y="587">邮件识别 Agent</text>
    <rect x="112" y="610" width="178" height="38" rx="12" fill="#111b37"/>
    <text x="136" y="635">KOL 评估 Agent</text>
    <rect x="112" y="658" width="178" height="38" rx="12" fill="#111b37"/>
    <text x="136" y="683">回复草稿 Agent</text>
  </g>

  <g transform="translate(112 856)">
    <rect width="178" height="112" rx="20" fill="#111b37"/>
    <text x="18" y="33" class="display white" font-size="16" font-weight="800">本地审计</text>
    <text x="18" y="58" class="font" font-size="12" fill="#94a3b8">每个动作都需确认</text>
    <rect x="18" y="78" width="142" height="12" rx="6" fill="#1f2a44"/>
    <rect x="18" y="78" width="106" height="12" rx="6" fill="url(#cyan)"/>
  </g>

  <rect x="332" y="184" width="454" height="818" rx="28" fill="#f8fafc"/>
  <text x="362" y="229" class="display ink" font-size="25" font-weight="800">合作邮件处理</text>
  <text x="362" y="256" class="font muted small">像 Codex 一样，用对话推进流程</text>

  <g transform="translate(362 288)" filter="url(#cardShadow)">
    <rect width="300" height="86" rx="22" fill="#fff"/>
    <rect width="300" height="86" rx="22" fill="none" stroke="#e2e8f0"/>
    <text x="22" y="31" class="font" font-size="15" fill="#0b1220" font-weight="800">用户</text>
    <text x="22" y="58" class="font" font-size="14" fill="#475569">帮我评估这封合作邮件，判断是否值得推进。</text>
  </g>

  <g transform="translate(422 402)" filter="url(#cardShadow)">
    <rect width="328" height="176" rx="24" fill="#fff"/>
    <rect width="328" height="176" rx="24" fill="none" stroke="#e2e8f0"/>
    <g transform="translate(22 22)">
      <rect width="34" height="34" rx="10" fill="url(#brand)"/>
      <path d="M17 7l2.8 6.1 6.7.8-4.8 4.7 1.2 6.6-5.9-3.3-5.9 3.3 1.2-6.6-4.8-4.7 6.7-.8z" fill="#fff"/>
      <text x="48" y="23" class="font" font-size="15" fill="#0b1220" font-weight="800">Incuboot</text>
    </g>
    <text x="22" y="80" class="font" font-size="14" fill="#334155">已识别为高匹配 KOL 合作线索。</text>
    <g class="font" font-size="12" font-weight="800">
      <rect x="22" y="100" width="76" height="26" rx="10" fill="#eef2ff"/>
      <text x="41" y="118" fill="#4f46e5">Beauty</text>
      <rect x="108" y="100" width="80" height="26" rx="10" fill="#ecfeff"/>
      <text x="128" y="118" fill="#0891b2">Fit 92</text>
      <rect x="198" y="100" width="92" height="26" rx="10" fill="#ecfdf5"/>
      <text x="217" y="118" fill="#059669">建议推进</text>
    </g>
    <rect x="22" y="140" width="284" height="14" rx="7" fill="#e2e8f0"/>
    <rect x="22" y="140" width="224" height="14" rx="7" fill="url(#brand)"/>
  </g>

  <g transform="translate(362 608)" filter="url(#cardShadow)">
    <rect width="388" height="176" rx="24" fill="#fff"/>
    <rect width="388" height="176" rx="24" fill="none" stroke="#e2e8f0"/>
    <text x="22" y="36" class="display ink label">Agent 正在执行</text>
    <g class="font" font-size="13" font-weight="700">
      <circle cx="34" cy="70" r="9" fill="#06b6d4"/>
      <text x="54" y="75" fill="#334155">读取邮件与历史往来</text>
      <rect x="242" y="58" width="96" height="24" rx="9" fill="#ecfeff"/>
      <text x="260" y="75" fill="#0891b2" font-size="12">已完成</text>
      <circle cx="34" cy="108" r="9" fill="#7c3aed"/>
      <text x="54" y="113" fill="#334155">更新 KOL 档案字段</text>
      <rect x="242" y="96" width="96" height="24" rx="9" fill="#f5f3ff"/>
      <text x="260" y="113" fill="#7c3aed" font-size="12">需确认</text>
      <circle cx="34" cy="146" r="9" fill="#f59e0b"/>
      <text x="54" y="151" fill="#334155">生成合作回复草稿</text>
      <rect x="242" y="134" width="96" height="24" rx="9" fill="#fff7ed"/>
      <text x="260" y="151" fill="#d97706" font-size="12">待审核</text>
    </g>
  </g>

  <g transform="translate(362 812)">
    <rect width="388" height="82" rx="24" fill="#fff" stroke="#e2e8f0"/>
    <text x="24" y="49" class="font" font-size="15" fill="#94a3b8">Ask Incuboot to draft a reply...</text>
    <rect x="322" y="22" width="42" height="38" rx="14" fill="#0b1028"/>
    <path d="M336 41h14M345 32l9 9-9 9" fill="none" stroke="#fff" stroke-width="2.3" class="round"/>
  </g>

  <rect x="808" y="184" width="202" height="818" rx="28" fill="#0e1430"/>
  <text x="835" y="229" class="display white" font-size="20" font-weight="800">结果面板</text>
  <text x="835" y="254" class="font" font-size="13" fill="#94a3b8">结构化数据与审计</text>

  <g transform="translate(830 292)" class="font" filter="url(#cardShadow)">
    <rect width="158" height="150" rx="20" fill="#fff"/>
    <text x="18" y="35" class="display ink" font-size="17" font-weight="800">KOL 档案</text>
    <circle cx="39" cy="78" r="25" fill="url(#brand)"/>
    <text x="39" y="87" text-anchor="middle" class="display white" font-size="24" font-weight="800">M</text>
    <text x="76" y="74" fill="#0b1220" font-size="14" font-weight="800">Maya C.</text>
    <text x="76" y="96" fill="#64748b" font-size="12">Beauty · US</text>
    <rect x="18" y="116" width="122" height="18" rx="9" fill="#e2e8f0"/>
    <rect x="18" y="116" width="104" height="18" rx="9" fill="url(#brand)"/>
  </g>

  <g transform="translate(830 468)" class="font" filter="url(#cardShadow)">
    <rect width="158" height="174" rx="20" fill="#fff"/>
    <text x="18" y="34" class="display ink" font-size="17" font-weight="800">确认队列</text>
    <rect x="18" y="54" width="122" height="30" rx="11" fill="#eef2ff"/>
    <text x="34" y="74" fill="#4f46e5" font-size="12" font-weight="800">发送提案邮件</text>
    <rect x="18" y="96" width="122" height="30" rx="11" fill="#ecfeff"/>
    <text x="34" y="116" fill="#0891b2" font-size="12" font-weight="800">写入联系人</text>
    <rect x="18" y="138" width="122" height="20" rx="10" fill="#ecfdf5"/>
    <text x="48" y="153" fill="#059669" font-size="11" font-weight="800">安全可控</text>
  </g>

  <g transform="translate(830 670)" class="font">
    <text class="display" font-size="17" fill="#a5b4fc" font-weight="800">审计日志</text>
    <g font-size="12">
      <rect y="28" width="158" height="48" rx="14" fill="#ffffff" fill-opacity=".08"/>
      <circle cx="18" cy="52" r="6" fill="#06b6d4"/>
      <text x="34" y="49" fill="#fff" font-weight="800">读取邮件</text>
      <text x="34" y="66" fill="#94a3b8">理由：合作线索</text>
      <rect y="88" width="158" height="48" rx="14" fill="#ffffff" fill-opacity=".08"/>
      <circle cx="18" cy="112" r="6" fill="#7c3aed"/>
      <text x="34" y="109" fill="#fff" font-weight="800">字段更新</text>
      <text x="34" y="126" fill="#94a3b8">等待人工确认</text>
      <rect y="148" width="158" height="48" rx="14" fill="#ffffff" fill-opacity=".08"/>
      <circle cx="18" cy="172" r="6" fill="#f59e0b"/>
      <text x="34" y="169" fill="#fff" font-weight="800">生成草稿</text>
      <text x="34" y="186" fill="#94a3b8">未自动发送</text>
    </g>
  </g>

  <g transform="translate(830 900)">
    <rect width="158" height="54" rx="18" fill="#111b37"/>
    <text x="18" y="24" class="display" font-size="15" fill="#fff" font-weight="800">下一步</text>
    <text x="18" y="43" class="font" font-size="12" fill="#10b981">确认后进入提案阶段</text>
  </g>
</svg>
